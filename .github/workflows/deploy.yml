name: Build and Deploy to Render

on:
  push:
    branches:
      - main
    paths:
      - 'resume-shortlisting-assistant/**'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ai-recruit-backend
  RENDER_SERVICE_ID: srv-d6i9bu1aae7s73ccjug0
  RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./resume-shortlisting-assistant
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get full image name
        id: image
        run: |
          # Get the SHA tag (short format like: abc1234)
          SHA_TAG=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA_TAG}"
          echo "tag=${SHA_TAG}" >> $GITHUB_OUTPUT
          echo "image=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Using image: ${IMAGE_TAG}"

      - name: Update and trigger Render deployment
        run: |
          # First, update the service to use the new image
          echo "Updating Render service to use image: ${{ steps.image.outputs.image }}"
          curl -X PATCH "https://api.render.com/v1/services/${{ env.RENDER_SERVICE_ID }}" \
            -H "Authorization: Bearer ${{ env.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"imagePath\": \"${{ steps.image.outputs.image }}\"
            }"

          echo "Triggering new deployment..."
          # Then trigger a manual deploy
          curl -X POST "https://api.render.com/v1/services/${{ env.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ env.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'

          echo "✅ Render deployment triggered successfully!"
          echo "🚀 Your service will be available at: https://ai-recruit-backend-main-d1009e8.onrender.com"
